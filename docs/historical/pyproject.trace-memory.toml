[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trace-memory"
version = "0.8.0a0"
description = "A Python memory layer for LLM agents with operationally validated trust composition."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Diego Falkowski Carboni", email = "diego@tyxter.dev" },
]
keywords = [
    "memory",
    "llm",
    "agent",
    "provenance",
    "source-monitoring",
    "anti-laundering",
    "trace-memory",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
embeddings = [
    "sentence-transformers>=2.2",
]
openai = [
    "openai>=1.0",
]
anthropic = [
    "anthropic>=0.18",
]
source-classifier = [
    "torch>=2.1",
    "transformers>=4.40",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
]

[project.urls]
Homepage = "https://github.com/carboni123/trace-memory"
Documentation = "https://github.com/carboni123/trace-memory#readme"
Source = "https://github.com/carboni123/trace-memory"
Issues = "https://github.com/carboni123/trace-memory/issues"
"Validation Framework" = "https://github.com/carboni123/trace-memory-architecture"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "live: tests that hit live LLM providers (network + API key required)",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = true
